<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة تفعيل الكورس</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark:    #07090f;
    --bg-card:    #0f1523;
    --bg-panel:   #0b1019;
    --accent:     #00d4ff;
    --accent2:    #7c3aed;
    --accent-glow: rgba(0,212,255,.20);
    --accent2-glow:rgba(124,58,237,.20);
    --text-main:  #ddeeff;
    --text-muted: #5a7a99;
    --border:     rgba(0,212,255,.18);
    --border2:    rgba(124,58,237,.25);
    --error:      #ff4d6d;
    --success:    #00e5a0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg-dark);
    color: var(--text-main);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ===== TOP BAR ===== */
  .topbar {
    height: 54px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 12px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
    transition: border-color .5s;
  }
  .topbar-logo {
    font-family: 'Tajawal', sans-serif;
    font-size: 19px;
    font-weight: 900;
    letter-spacing: 1px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .topbar-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:.4;transform:scale(1.4)}
  }
  .topbar-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-right: auto;
    letter-spacing:.5px;
    transition: opacity .4s;
  }
  /* hide topbar subtitle after activation */
  body.activated .topbar-sub { opacity: 0; }

  /* ===== MAIN SPLIT LAYOUT ===== */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* ===== RIGHT PANEL – ACTIVATION ===== */
  .panel-right {
    width: 400px;
    min-width: 340px;
    background: var(--bg-panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    /* transition for slide-out */
    transition: width .55s cubic-bezier(.77,0,.18,1),
                min-width .55s cubic-bezier(.77,0,.18,1),
                opacity .4s ease,
                padding .55s ease;
    z-index: 2;
  }

  /* decorative background orbs */
  .panel-right::before {
    content:'';
    position:absolute;
    width:300px;height:300px;
    border-radius:50%;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    top:-80px; right:-80px;
    pointer-events:none;
  }
  .panel-right::after {
    content:'';
    position:absolute;
    width:250px;height:250px;
    border-radius:50%;
    background: radial-gradient(circle, var(--accent2-glow) 0%, transparent 70%);
    bottom:-60px; left:-60px;
    pointer-events:none;
  }

  /* collapsed state after activation */
  body.activated .panel-right {
    width: 0 !important;
    min-width: 0 !important;
    opacity: 0;
    padding: 0;
    overflow: hidden;
  }
  body.activated .divider-line {
    width: 0;
    opacity: 0;
  }

  .card {
    width: 100%;
    max-width: 340px;
    background: var(--bg-card);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 36px 28px 32px;
    position: relative;
    z-index: 2;
    box-shadow: 0 8px 40px rgba(0,0,0,.5), 0 0 0 1px rgba(0,212,255,.06);
  }

  .card-icon {
    width: 60px; height: 60px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 26px;
    box-shadow: 0 4px 20px var(--accent2-glow);
  }

  .card-title {
    text-align: center;
    font-family: 'Tajawal', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--text-main);
    margin-bottom: 6px;
    letter-spacing: .3px;
  }

  .card-desc {
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 28px;
    line-height: 1.7;
  }

  /* ===== FORM ===== */
  .field {
    margin-bottom: 18px;
  }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
    letter-spacing: .4px;
  }
  .field input {
    width: 100%;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text-main);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .25s, box-shadow .25s;
    direction: rtl;
  }
  .field input::placeholder { color: var(--text-muted); }
  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .field input.error-input {
    border-color: var(--error);
    box-shadow: 0 0 0 3px rgba(255,77,109,.15);
  }
  .field input.success-input {
    border-color: var(--success);
    box-shadow: 0 0 0 3px rgba(0,229,160,.12);
  }

  /* ===== BUTTON ===== */
  .btn-activate {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);
    color: #fff;
    font-family: 'Tajawal', sans-serif;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: .5px;
    cursor: pointer;
    transition: opacity .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 4px 20px var(--accent2-glow);
    margin-top: 8px;
  }
  .btn-activate:hover {
    opacity: .9;
    transform: translateY(-1px);
    box-shadow: 0 8px 28px var(--accent2-glow);
  }
  .btn-activate:active { transform: translateY(0); }
  .btn-activate:disabled { opacity:.5; cursor:not-allowed; transform:none; }

  /* ===== MESSAGES ===== */
  .msg {
    margin-top: 14px;
    border-radius: 10px;
    padding: 11px 16px;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    display: none;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .msg.error  { background:rgba(255,77,109,.12); border:1px solid rgba(255,77,109,.3); color:var(--error);   display:block; }
  .msg.success{ background:rgba(0,229,160,.10);  border:1px solid rgba(0,229,160,.3);  color:var(--success); display:block; }

  /* ===== LEFT PANEL – COURSE IFRAME ===== */
  .panel-left {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-dark);
    position: relative;
    transition: flex .55s cubic-bezier(.77,0,.18,1);
  }

  /* locked overlay */
  .lock-overlay {
    position: absolute;
    inset: 0;
    background: var(--bg-dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 5;
    transition: opacity .5s, visibility .5s;
  }
  .lock-overlay.hidden {
    opacity: 0;
    visibility: hidden;
  }
  .lock-icon {
    font-size: 64px;
    filter: drop-shadow(0 0 24px var(--accent2));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .lock-text {
    font-family: 'Tajawal', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: .5px;
    text-align: center;
  }
  .lock-sub {
    font-size: 13px;
    color: rgba(90,122,153,.6);
    text-align: center;
  }

  /* grid pattern on lock */
  .lock-overlay::before {
    content:'';
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
  }

  /* iframe */
  .course-frame {
    width: 100%;
    height: 100%;
    border: none;
    opacity: 0;
    transition: opacity .5s ease .4s; /* fade in after panel slides away */
  }
  .course-frame.visible {
    opacity: 1;
  }

  /* ===== DIVIDER LINE ===== */
  .divider-line {
    width: 4px;
    background: linear-gradient(180deg, transparent, var(--accent2), var(--accent), transparent);
    flex-shrink: 0;
    opacity: .35;
    transition: width .55s cubic-bezier(.77,0,.18,1), opacity .3s ease;
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:var(--bg-dark)}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <span class="topbar-logo"><a href="html.html">⚡ AFIFY STUDIO </a></span>
  <span class="topbar-dot"></span>
  <span class="topbar-sub">بوابة تفعيل الكورس</span>
</div>

<!-- MAIN LAYOUT -->
<div class="main">

  <!-- RIGHT: ACTIVATION PANEL -->
  <div class="panel-right" id="panelRight">
    <div class="card">
      <div class="card-icon">🔐</div>
      <div class="card-title">تفعيل الكورس</div>
      <div class="card-desc">أدخل اسمك وكود التفعيل الخاص بك<br>للوصول إلى محتوى الكورس</div>

      <div class="field">
        <label>👤 الاسم</label>
        <input type="text" id="nameInput" placeholder="أدخل اسمك هنا..." autocomplete="off"/>
      </div>

      <div class="field">
        <label>🔑 كود التفعيل</label>
        <input type="text" id="codeInput" placeholder="أدخل كود التفعيل..." autocomplete="off" style="text-transform:uppercase; font-family:monospace; letter-spacing:1px;"/>
      </div>

      <button class="btn-activate" id="activateBtn" onclick="activate()">
        ✨ تفعيل الكورس
      </button>

      <div class="msg" id="msgBox"></div>
    </div>
  </div>

  <!-- DIVIDER -->
  <div class="divider-line" id="dividerLine"></div>

  <!-- LEFT: COURSE CONTENT -->
  <div class="panel-left">

    <!-- Lock overlay (shown before activation) -->
    <div class="lock-overlay" id="lockOverlay">
      <div class="lock-icon">🔒</div>
      <div class="lock-text">المحتوى محمي</div>
      <div class="lock-sub">قم بتفعيل الكورس من الجانب الأيمن<br>للوصول إلى المحتوى</div>
    </div>

    <!-- Course iframe (hidden until activated) -->
    <iframe
      class="course-frame"
      id="courseFrame"
      src=""
      title="محتوى الكورس"
    ></iframe>

  </div>
</div>

<script>
  // ===== CONFIG =====
  const COURSE_FILE = 'https://html-css-js-0-ahmed-afify-0.netlify.app/';
  const CODES_FILE  = 't.txt';
  const SECRET_SALT = 'AFIFY_STUDIO_2025';

  let validCodes = [];

  async function generateToken(name, code) {
    const raw = name + ':' + code + ':' + SECRET_SALT;
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(raw));
    return Array.from(new Uint8Array(buf))
      .map(b => b.toString(16).padStart(2,'0')).join('').substring(0, 32);
  }

  async function loadCodes() {
    try {
      const res = await fetch(CODES_FILE + '?v=' + Date.now());
      if (!res.ok) throw new Error('not found');
      const text = await res.text();
      validCodes = text
        .split('\n')
        .map(line => line.trim().toUpperCase())
        .filter(line => line.includes('-'))
        .map(line => {
          const idx  = line.indexOf('-');
          return {
            name: line.substring(0, idx),
            code: line.substring(idx + 1)
          };
        });
      console.log('✅ تم تحميل', validCodes.length, 'إدخال من t.txt', validCodes);
    } catch(e) {
      console.warn('⚠️ تعذر تحميل t.txt');
      validCodes = [];
    }
  }

  async function activate() {
    const name      = document.getElementById('nameInput').value.trim().toUpperCase();
    const code      = document.getElementById('codeInput').value.trim().toUpperCase();
    const msg       = document.getElementById('msgBox');
    const nameInput = document.getElementById('nameInput');
    const codeInput = document.getElementById('codeInput');
    const btn       = document.getElementById('activateBtn');

    msg.className = 'msg';
    msg.textContent = '';
    nameInput.classList.remove('error-input','success-input');
    codeInput.classList.remove('error-input','success-input');

    if (!name) {
      nameInput.classList.add('error-input');
      showMsg('⚠️ من فضلك أدخل اسمك أولاً', 'error');
      nameInput.focus();
      return;
    }
    if (!code) {
      codeInput.classList.add('error-input');
      showMsg('⚠️ من فضلك أدخل كود التفعيل', 'error');
      codeInput.focus();
      return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ جارٍ التحقق...';
    await sleep(700);

    if (validCodes.length === 0) await loadCodes();

    const match = validCodes.find(entry => entry.name === name && entry.code === code);

    if (match) {
      nameInput.classList.add('success-input');
      codeInput.classList.add('success-input');
      btn.textContent = '✅ تم التفعيل!';
      showMsg(`🎉 أهلاً ${document.getElementById('nameInput').value.trim()}! جارٍ فتح الكورس...`, 'success');
      await sleep(900);
      openCourse();
    } else {
      const nameExists = validCodes.find(e => e.name === name);
      const codeExists = validCodes.find(e => e.code === code);

      if (!nameExists) nameInput.classList.add('error-input');
      if (!codeExists) codeInput.classList.add('error-input');

      btn.disabled = false;
      btn.textContent = '✨ تفعيل الكورس';
      showMsg('❌ الاسم أو كود التفعيل غير صحيح، تأكد وحاول مجدداً', 'error');

      codeInput.style.animation = 'shake .4s ease';
      setTimeout(() => codeInput.style.animation = '', 400);
    }
  }

  function openCourse() {
    const frame   = document.getElementById('courseFrame');
    const overlay = document.getElementById('lockOverlay');

    // 1) load iframe src
    frame.src = COURSE_FILE;

    // 2) hide lock overlay
    overlay.classList.add('hidden');

    // 3) slide away the right panel → full-width iframe
    document.body.classList.add('activated');

    // 4) fade in iframe after panel animation finishes (~550ms)
    setTimeout(() => {
      frame.classList.add('visible');
    }, 550);
  }

  function showMsg(text, type) {
    const msg = document.getElementById('msgBox');
    msg.textContent = text;
    msg.className = 'msg ' + type;
  }

  function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') activate();
  });

  const shakeStyle = document.createElement('style');
  shakeStyle.textContent = `
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)}
      60%{transform:translateX(-5px)}
      80%{transform:translateX(5px)}
    }
  `;
  document.head.appendChild(shakeStyle);

  loadCodes();
</script>
</body>
</html>
