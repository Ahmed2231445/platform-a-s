<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Platform — Ahmed Afify</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cairo:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root {
  --bg: #0a0a0a; --bg2: #111;
  --a1: #00ff88; --a2: #00cc66;
  --txt: #fff; --txt2: #999;
  --glow: rgba(0,255,136,0.35);
  --tr: 1.1s cubic-bezier(.4,0,.2,1);
  --card: rgba(0,255,136,0.06);
  --border: rgba(0,255,136,0.22);
}
.day {
  --bg: #edf8f2; --bg2: #dff0e8;
  --a1: #0055cc; --a2: #0033aa;
  --txt: #07070f; --txt2: #445;
  --glow: rgba(0,85,204,0.28);
  --card: rgba(0,85,204,0.06);
  --border: rgba(0,85,204,0.22);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Cairo',sans-serif;overflow:hidden;height:100vh;width:100vw;transition:background var(--tr),color var(--tr);cursor:none}
#bg-canvas{position:fixed;inset:0;z-index:0}
#grid{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.04;background-image:linear-gradient(var(--a1) 1px,transparent 1px),linear-gradient(90deg,var(--a1) 1px,transparent 1px);background-size:60px 60px}
#scanline{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px)}
.orb{position:fixed;border-radius:50%;filter:blur(60px);opacity:.12;pointer-events:none;z-index:1;animation:orbF 8s ease-in-out infinite}
.o1{width:400px;height:400px;background:var(--a1);top:-100px;right:-100px;animation-delay:0s}
.o2{width:300px;height:300px;background:var(--a2);bottom:-80px;left:-80px;animation-delay:-3s}
.o3{width:200px;height:200px;background:var(--a1);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-6s}
@keyframes orbF{0%,100%{transform:translateY(0) scale(1)}33%{transform:translateY(-26px) scale(1.04)}66%{transform:translateY(18px) scale(.96)}}
.corner{position:fixed;width:54px;height:54px;opacity:.3;transition:border-color var(--tr)}
.c-tr{top:16px;right:16px;border-top:1.5px solid var(--a1);border-right:1.5px solid var(--a1)}
.c-bl{bottom:16px;left:16px;border-bottom:1.5px solid var(--a1);border-left:1.5px solid var(--a1)}
#cursor{position:fixed;width:11px;height:11px;background:var(--a1);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 18px var(--glow);transition:width .3s,height .3s,background var(--tr)}
#cring{position:fixed;width:38px;height:38px;border:1.5px solid var(--a1);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:.5;transition:border-color var(--tr)}

/* ─── Top controls ─── */
#toggle-btn{position:fixed;top:20px;left:20px;z-index:1000;background:transparent;border:1.5px solid var(--a1);border-radius:50px;padding:9px 20px;color:var(--a1);font-family:'Cairo',sans-serif;font-size:13px;cursor:none;transition:all var(--tr);display:flex;align-items:center;gap:8px;letter-spacing:1px;box-shadow:0 0 13px var(--glow)}
#toggle-btn:hover{background:var(--a1);color:var(--bg);box-shadow:0 0 26px var(--glow)}
#star-btn{position:fixed;top:16px;right:20px;z-index:1000;background:transparent;border:none;font-size:30px;cursor:none;filter:drop-shadow(0 0 7px var(--a1));animation:sPulse 3s ease-in-out infinite;transition:transform .3s}
#star-btn:hover{transform:scale(1.35) rotate(22deg)}
@keyframes sPulse{0%,100%{filter:drop-shadow(0 0 7px var(--a1))}50%{filter:drop-shadow(0 0 20px var(--a1)) brightness(1.5)}}

/* ─── Title ─── */
#main{position:relative;z-index:10;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column}
#title-wrap{width:90vw;max-width:960px;transition:opacity 2s ease,transform 2s ease}
#title-svg{width:100%;overflow:visible}
#status-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:16px;align-items:center;font-size:11px;color:var(--a1);letter-spacing:3px;opacity:.5;transition:opacity 2s,color var(--tr)}
.dot{width:4px;height:4px;background:var(--a1);border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

/* ─── Auth card ─── */
#auth-wrap{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 1.2s ease}
#auth-wrap.show{opacity:1;pointer-events:all}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:38px 44px;width:min(410px,92vw);backdrop-filter:blur(20px);box-shadow:0 0 55px var(--glow);transition:background var(--tr),border-color var(--tr),box-shadow var(--tr)}
.auth-card h2{font-family:'Cinzel Decorative',cursive;font-size:19px;color:var(--a1);text-align:center;margin-bottom:5px;letter-spacing:2px;transition:color var(--tr)}
.sub-lbl{text-align:center;font-size:11px;color:var(--txt2);letter-spacing:1.5px;margin-bottom:30px}
.field{margin-bottom:16px;position:relative}
.field label{display:block;font-size:11px;color:var(--a1);letter-spacing:1.5px;margin-bottom:5px;transition:color var(--tr)}
.field input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:12px 44px 12px 44px;color:var(--txt);font-family:'Cairo',sans-serif;font-size:14px;outline:none;transition:border-color .3s,box-shadow .3s,color var(--tr),background var(--tr)}
.field input:focus{border-color:var(--a1);box-shadow:0 0 14px var(--glow)}
.field input::placeholder{color:var(--txt2);opacity:.6}
.ico-r{position:absolute;bottom:12px;right:13px;font-size:15px;opacity:.45;pointer-events:none}
.eye-btn{position:absolute;bottom:10px;left:11px;background:none;border:none;cursor:none;font-size:16px;opacity:.5;color:var(--a1);transition:opacity .2s}
.eye-btn:hover{opacity:1}
.auth-btn{width:100%;padding:13px;background:var(--a1);color:var(--bg);border:none;border-radius:10px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:600;cursor:none;letter-spacing:.5px;transition:all .3s;margin-top:4px;box-shadow:0 0 18px var(--glow)}
.auth-btn:hover{filter:brightness(1.12);box-shadow:0 0 34px var(--glow);transform:translateY(-1px)}
.switch-link{text-align:center;margin-top:16px;font-size:12px;color:var(--txt2)}
.switch-link a{color:var(--a1);cursor:none;text-decoration:none;border-bottom:1px solid transparent;transition:border-color .2s}
.switch-link a:hover{border-color:var(--a1)}
.msg{text-align:center;font-size:13px;margin-top:10px;min-height:18px;font-weight:600}
.msg.ok{color:#00ff88}.msg.err{color:#ff4060}

/* ─── Effects ─── */
#mode-overlay{position:fixed;inset:0;z-index:500;pointer-events:none;opacity:0;transition:opacity .35s}
.ripple{position:fixed;border-radius:50%;border:1px solid var(--a1);pointer-events:none;z-index:9997;transform:translate(-50%,-50%) scale(0);animation:ripOut .9s ease-out forwards;opacity:.55}
@keyframes ripOut{to{transform:translate(-50%,-50%) scale(4);opacity:0}}
.sp{position:fixed;pointer-events:none;z-index:9996;border-radius:50%;animation:spFly linear forwards}
@keyframes spFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:var(--tx) scale(0)}}
@keyframes shake{0%,100%{transform:none}10%{transform:translate(-9px,-5px) rotate(-1.5deg)}25%{transform:translate(8px,7px) rotate(1deg)}40%{transform:translate(-7px,6px) rotate(-1deg)}55%{transform:translate(9px,-7px) rotate(1.5deg)}70%{transform:translate(-8px,5px) rotate(-1deg)}85%{transform:translate(7px,-6px) rotate(1deg)}}
body.shaking{animation:shake .65s ease}
@keyframes cardShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="grid"></div>
<div id="scanline"></div>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
<div class="corner c-tr"></div><div class="corner c-bl"></div>
<div id="cursor"></div><div id="cring"></div>
<div id="mode-overlay"></div>

<!-- Controls -->
<button id="toggle-btn" onclick="toggleMode()">
  <span id="t-icon">☀️</span><span id="t-label">النهار</span>
</button>
<button id="star-btn" onclick="triggerStorm()" title="عاصفة نجمية">⭐</button>

<!-- Intro title -->
<div id="main">
  <div id="title-wrap">
    <svg id="title-svg" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <mask id="fill-mask">
          <rect id="mask-rect" x="0" y="220" width="900" height="0" fill="white"/>
        </mask>
        <filter id="gf">
          <feGaussianBlur stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <text x="450" y="108" font-family="'Cinzel Decorative',cursive" font-size="64" font-weight="900" text-anchor="middle" fill="none" stroke="#00ff88" stroke-width=".8" id="t-out" filter="url(#gf)" opacity="0">Welcome to Platform</text>
      <text x="450" y="108" font-family="'Cinzel Decorative',cursive" font-size="64" font-weight="900" text-anchor="middle" fill="#00ff88" id="t-fill" mask="url(#fill-mask)" opacity="0">Welcome to Platform</text>
      <text x="450" y="173" font-family="'Cinzel Decorative',cursive" font-size="28" text-anchor="middle" fill="none" stroke="#00ff88" stroke-width=".6" id="s-out" opacity="0">(Ahmed Afify)</text>
      <text x="450" y="173" font-family="'Cinzel Decorative',cursive" font-size="28" text-anchor="middle" fill="#ffffff" id="s-fill" mask="url(#fill-mask)" opacity="0">(Ahmed Afify)</text>
    </svg>
  </div>
</div>

<div id="status-bar">
  <div class="dot"></div><span>PLATFORM</span>
  <div class="dot"></div><span>AHMED AFIFY</span>
  <div class="dot"></div><span>v1.0</span>
  <div class="dot"></div>
</div>

<!-- Auth panel -->
<div id="auth-wrap">
  <!-- LOGIN -->
  <div class="auth-card" id="login-card">
    <h2>تسجيل الدخول</h2>
    <p class="sub-lbl">PLATFORM &middot; AHMED AFIFY</p>

    <div class="field">
      <label>اسم المستخدم</label>
      <input type="text" id="l-user" placeholder="username" autocomplete="off"/>
      <span class="ico-r">👤</span>
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="l-pass" placeholder="••••••••" autocomplete="off"/>
      <span class="ico-r">🔒</span>
      <button class="eye-btn" id="l-eye" onclick="toggleEye('l-pass','l-eye')">👁</button>
    </div>

    <button class="auth-btn" onclick="doLogin()">دخول &rarr;</button>
    <div class="msg" id="l-msg"></div>
    <div class="switch-link">ليس لديك حساب؟ <a onclick="switchTo('reg')">إنشاء حساب</a></div>
  </div>

  <!-- REGISTER -->
  <div class="auth-card" id="reg-card" style="display:none;opacity:0">
    <h2>إنشاء حساب جديد</h2>
    <p class="sub-lbl">PLATFORM &middot; AHMED AFIFY</p>

    <div class="field">
      <label>اسم المستخدم</label>
      <input type="text" id="r-user" placeholder="username" autocomplete="off"/>
      <span class="ico-r">👤</span>
    </div>
    <div class="field">
      <label>البريد الإلكتروني</label>
      <input type="email" id="r-email" placeholder="you@example.com" autocomplete="off"/>
      <span class="ico-r">✉️</span>
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="r-pass" placeholder="••••••••" autocomplete="off"/>
      <span class="ico-r">🔒</span>
      <button class="eye-btn" id="r-eye" onclick="toggleEye('r-pass','r-eye')">👁</button>
    </div>
    <div class="field">
      <label>تأكيد كلمة المرور</label>
      <input type="password" id="r-pass2" placeholder="••••••••" autocomplete="off"/>
      <span class="ico-r">🔒</span>
      <button class="eye-btn" id="r-eye2" onclick="toggleEye('r-pass2','r-eye2')">👁</button>
    </div>

    <button class="auth-btn" onclick="doRegister()">إنشاء الحساب ✓</button>
    <div class="msg" id="r-msg"></div>
    <div class="switch-link">لديك حساب؟ <a onclick="switchTo('login')">تسجيل الدخول</a></div>
  </div>
</div>

<script>
// ══════ USERS — loaded live from Name.txt ══════
// Live Server (VS Code) serves Name.txt as a static file.
// Just place Name.txt next to this HTML file, format: username:password per line.
let sessionUsers = {};
let usersLoaded = false;

async function loadUsers() {
  try {
    // cache-bust so Live Server always returns the latest saved version
    const res = await fetch('Name.txt?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    sessionUsers = {};
    text.trim().split('\n').forEach(line => {
      line = line.trim();
      if (!line || line.startsWith('#')) return; // skip empty lines & comments
      const idx = line.indexOf(':');
      if (idx > 0) {
        const u = line.slice(0, idx).trim();
        const p = line.slice(idx + 1).trim();
        if (u && p) sessionUsers[u] = p;
      }
    });
    usersLoaded = true;
    console.log('%c✓ Name.txt loaded — ' + Object.keys(sessionUsers).length + ' user(s)', 'color:#00ff88');
  } catch (err) {
    usersLoaded = false;
    console.error('✗ Name.txt not found. Make sure it is in the same folder as this HTML file.', err.message);
  }
}
loadUsers();

// ══════ STATE ══════
let isDayMode=false, mouseX=innerWidth/2, mouseY=innerHeight/2;
let cursorX=mouseX, cursorY=mouseY, ringX=mouseX, ringY=mouseY;

// ══════ CANVAS ══════
const canvas=document.getElementById('bg-canvas'), ctx=canvas.getContext('2d');
let W,H;
function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; }
resize(); window.addEventListener('resize',resize);

class Particle{
  constructor(){this.reset();}
  reset(){
    this.x=Math.random()*W; this.y=Math.random()*H;
    this.vx=(Math.random()-.5)*.4; this.vy=(Math.random()-.5)*.4-.2;
    this.sz=Math.random()*2.4+.5; this.al=Math.random()*.6+.2;
    this.life=Math.random()*200+100; this.maxL=this.life;
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.life--; if(this.life<=0||this.x<0||this.x>W||this.y<0||this.y>H) this.reset(); }
  draw(){ const a=(this.life/this.maxL)*this.al; ctx.beginPath(); ctx.arc(this.x,this.y,this.sz,0,Math.PI*2); ctx.fillStyle=isDayMode?`rgba(0,85,204,${a})`:`rgba(0,255,136,${a})`; ctx.fill(); }
}
const parts=[]; for(let i=0;i<160;i++) parts.push(new Particle());

function drawLinks(){
  const col=isDayMode?'0,85,204':'0,255,136';
  for(let i=0;i<parts.length;i++) for(let j=i+1;j<parts.length;j++){
    const dx=parts[i].x-parts[j].x, dy=parts[i].y-parts[j].y, d=Math.sqrt(dx*dx+dy*dy);
    if(d<115){ ctx.beginPath(); ctx.strokeStyle=`rgba(${col},${.12*(1-d/115)})`; ctx.lineWidth=.5; ctx.moveTo(parts[i].x,parts[i].y); ctx.lineTo(parts[j].x,parts[j].y); ctx.stroke(); }
  }
}
function mousePull(){ parts.forEach(p=>{ const dx=mouseX-p.x,dy=mouseY-p.y,d=Math.sqrt(dx*dx+dy*dy); if(d<160){ p.vx+=dx/d*.05; p.vy+=dy/d*.05; const sp=Math.sqrt(p.vx*p.vx+p.vy*p.vy); if(sp>2){p.vx*=2/sp;p.vy*=2/sp;} } }); }
(function loop(){
  ctx.clearRect(0,0,W,H);
  const g=ctx.createRadialGradient(mouseX,mouseY,0,mouseX,mouseY,280);
  g.addColorStop(0,isDayMode?'rgba(0,85,204,.04)':'rgba(0,255,136,.04)'); g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  mousePull(); drawLinks(); parts.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(loop);
})();

// ══════ CURSOR ══════
const cur=document.getElementById('cursor'), ring=document.getElementById('cring');
document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});
(function animCur(){
  cursorX+=(mouseX-cursorX)*.2; cursorY+=(mouseY-cursorY)*.2;
  ringX+=(mouseX-ringX)*.08; ringY+=(mouseY-ringY)*.08;
  cur.style.left=cursorX+'px'; cur.style.top=cursorY+'px';
  ring.style.left=ringX+'px'; ring.style.top=ringY+'px';
  requestAnimationFrame(animCur);
})();
document.addEventListener('click',e=>{
  const r=document.createElement('div'); r.className='ripple';
  r.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;width:60px;height:60px`;
  document.body.appendChild(r); setTimeout(()=>r.remove(),950);
});
document.addEventListener('mouseover',e=>{
  if(e.target.matches('button,a,input')){cur.style.width='20px';cur.style.height='20px';ring.style.width='56px';ring.style.height='56px';}
  else{cur.style.width='11px';cur.style.height='11px';ring.style.width='38px';ring.style.height='38px';}
});

// ══════ DAY/NIGHT ══════
function toggleMode(){
  isDayMode=!isDayMode;
  document.body.classList.toggle('day',isDayMode);
  document.getElementById('t-icon').textContent=isDayMode?'🌙':'☀️';
  document.getElementById('t-label').textContent=isDayMode?'الليل':'النهار';
  const ov=document.getElementById('mode-overlay');
  ov.style.background=isDayMode?'rgba(255,255,255,.1)':'rgba(0,0,0,.1)';
  ov.style.opacity='1'; setTimeout(()=>ov.style.opacity='0',370);
  const ac=isDayMode?'#0055cc':'#00ff88', sc=isDayMode?'#07070f':'#ffffff';
  document.getElementById('t-out').setAttribute('stroke',ac);
  document.getElementById('t-fill').setAttribute('fill',ac);
  document.getElementById('s-out').setAttribute('stroke',ac);
  document.getElementById('s-fill').setAttribute('fill',sc);
}

// ══════ WATER FILL ══════
function startFill(){
  const to=document.getElementById('t-out'),tf=document.getElementById('t-fill');
  const so=document.getElementById('s-out'),sf=document.getElementById('s-fill');
  const mr=document.getElementById('mask-rect');
  [to,tf,so,sf].forEach(el=>el.style.transition='opacity 1.5s ease');
  to.style.opacity='1'; tf.style.opacity='1';
  setTimeout(()=>{so.style.opacity='1';sf.style.opacity='1';},500);
  setTimeout(()=>{
    let prog=0;
    function go(){ prog+=.85; const e=ease(Math.min(prog/220,1)),h=e*240; mr.setAttribute('y',220-h); mr.setAttribute('height',h); if(prog<260) requestAnimationFrame(go); }
    go();
  },1800);
}
function ease(t){ return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }

// ══════ STAR STORM ══════
function triggerStorm(){
  // Shake body
  document.body.classList.remove('shaking'); void document.body.offsetWidth;
  document.body.classList.add('shaking'); setTimeout(()=>document.body.classList.remove('shaking'),700);

  // Spawn flying particles
  const colors=['#00ff88','#ffffff','#00cc66','#aaffcc','#00ddaa','#88ffcc'];
  for(let i=0;i<130;i++){
    setTimeout(()=>{
      const el=document.createElement('div'); el.className='sp';
      const sz=Math.random()*7+2, x=Math.random()*W, y=Math.random()*H;
      const angle=Math.random()*Math.PI*2, dist=Math.random()*500+150;
      const tx=`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`;
      el.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;background:${colors[Math.floor(Math.random()*colors.length)]};--tx:${tx};animation-duration:${Math.random()*.9+.3}s;box-shadow:0 0 ${sz*2}px currentColor`;
      document.body.appendChild(el); setTimeout(()=>el.remove(),1300);
    },i*8);
  }

  // After 800ms: switch between login & register
  setTimeout(()=>{
    const lc=document.getElementById('login-card');
    const rc=document.getElementById('reg-card');
    const showingLogin = lc.style.display!=='none';
    switchTo(showingLogin?'reg':'login');
  },800);
}

// ══════ BOOT ══════
setTimeout(()=>startFill(),500);
setTimeout(()=>{
  const tw=document.getElementById('title-wrap'), sb=document.getElementById('status-bar');
  tw.style.opacity='0'; tw.style.transform='translateY(-26px)';
  sb.style.opacity='0';
  setTimeout(()=>{
    tw.style.display='none'; sb.style.display='none';
    document.getElementById('auth-wrap').classList.add('show');
  },2100);
},6000);

// ══════ AUTH ══════
function toggleEye(id,btnId){
  const inp=document.getElementById(id), btn=document.getElementById(btnId);
  inp.type=inp.type==='password'?'text':'password';
  btn.textContent=inp.type==='text'?'🙈':'👁';
}
function showMsg(id,text,type){ const el=document.getElementById(id); el.textContent=text; el.className='msg '+type; setTimeout(()=>{el.textContent='';el.className='msg';},3000); }

async function doLogin(){
  const u=document.getElementById('l-user').value.trim();
  const p=document.getElementById('l-pass').value;
  if(!u||!p){ showMsg('l-msg','⚠ أدخل اسم المستخدم وكلمة المرور','err'); return; }
